<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Navbar with Login & Signup Modal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">
            <img src="./Images/logo.svg" alt="Cariera" style="height: 30px;">
           
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link text-primary" href="#">HOME</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-primary" href="#">About US</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-primary" href="#">Contact</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-primary" href="#">Services</a>
                </li>
                <li class="nav-item ms-2">
                    
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#authModal">LOGIN </button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Authentication Modal -->
<div class="modal fade" id="authModal" tabindex="-1" aria-labelledby="authModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="authModalLabel">Login</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                
                <!-- Login Form -->
                <form id="loginForm" action="LoginServlet">
                    <div class="mb-3">
                        <label for="loginEmail" class="form-label" >Email</label>
                        <input type="email" class="form-control" id="email" name="email"required placeholder="Enter your email">
                    </div>
                    <div class="mb-3">
                        <label for="loginPassword" class="form-label">Password</label>
                        <input type="password" class="form-control" id="Password" name="Password" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                    <div class="text-center mt-2">
                        <small>Don't have an account? <a href="#" onclick="showSignup()">Sign up</a></small>
                    </div>
                </form>

                <!-- Signup Form (Hidden by Default) -->
                <form id="signupForm" class="hidden" action="SignupServlet">
                    <div class="mb-3">
                        <label for="signupName" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="signupName" name="username" required placeholder="Enter your full name">
                    </div>
                    <div class="mb-3">
                        <label for="signupEmail" class="form-label required">Email</label>
                        <input type="email" class="form-control" id="signupEmail" name="email"required placeholder="Enter your email">
                    </div>
                    <div class="mb-3">
                        <label for="signupPassword" class="form-label required">Password</label>
                        <input type="password" class="form-control" name="Password" id="signupPassword" required placeholder="Create a password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign Up</button>
                    <div class="text-center mt-2">
                        <small>Already have an account? <a href="#" onclick="showLogin()">Login</a></small>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<script>
    function showSignup() {
        document.getElementById("loginForm").classList.add("hidden");
        document.getElementById("signupForm").classList.remove("hidden");
        document.getElementById("authModalLabel").innerText = "Sign Up";
    }

    function showLogin() {
        document.getElementById("signupForm").classList.add("hidden");
        document.getElementById("loginForm").classList.remove("hidden");
        document.getElementById("authModalLabel").innerText = "Login";
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
